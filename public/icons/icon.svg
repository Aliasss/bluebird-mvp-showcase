<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="#2D6A4F"/>
  
  <!-- Bluebird Symbol -->
  <g transform="translate(256, 256)">
    <!-- Bird Body -->
    <ellipse cx="0" cy="0" rx="80" ry="100" fill="white" opacity="0.95"/>
    
    <!-- Left Wing -->
    <path d="M -40 -20 Q -100 -60 -120 -40 Q -100 -20 -60 0 Z" fill="white" opacity="0.9"/>
    
    <!-- Right Wing -->
    <path d="M 40 -20 Q 100 -60 120 -40 Q 100 -20 60 0 Z" fill="white" opacity="0.9"/>
    
    <!-- Head -->
    <circle cx="0" cy="-60" r="40" fill="white"/>
    
    <!-- Beak -->
    <path d="M 0 -60 L 20 -55 L 0 -50 Z" fill="#FFB340"/>
    
    <!-- Eye -->
    <circle cx="-10" cy="-65" r="5" fill="#2D6A4F"/>
    
    <!-- Tail -->
    <path d="M 0 80 Q -30 120 -10 140 Q 0 120 0 100 Q 0 120 10 140 Q 30 120 0 80 Z" fill="white" opacity="0.85"/>
  </g>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="115" fill="url(#shine)"/>
</svg>
