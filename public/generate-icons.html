<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Generate PWA Icons</title>
</head>
<body>
  <h1>PWA 아이콘 생성기</h1>
  <canvas id="canvas192" width="192" height="192"></canvas>
  <canvas id="canvas512" width="512" height="512"></canvas>
  <br><br>
  <button onclick="downloadIcons()">아이콘 다운로드</button>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      const scale = size / 512;
      
      // Background
      ctx.fillStyle = '#2D6A4F';
      ctx.fillRect(0, 0, size, size);
      
      // Draw simplified bird
      ctx.save();
      ctx.translate(size / 2, size / 2);
      ctx.scale(scale, scale);
      
      // Body
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.ellipse(0, 0, 80, 100, 0, 0, Math.PI * 2);
      ctx.fill();
      
      // Head
      ctx.beginPath();
      ctx.arc(0, -60, 40, 0, Math.PI * 2);
      ctx.fill();
      
      // Eye
      ctx.fillStyle = '#2D6A4F';
      ctx.beginPath();
      ctx.arc(-10, -65, 5, 0, Math.PI * 2);
      ctx.fill();
      
      // Beak
      ctx.fillStyle = '#FFB340';
      ctx.beginPath();
      ctx.moveTo(0, -60);
      ctx.lineTo(20, -55);
      ctx.lineTo(0, -50);
      ctx.closePath();
      ctx.fill();
      
      ctx.restore();
    }

    drawIcon(document.getElementById('canvas192'), 192);
    drawIcon(document.getElementById('canvas512'), 512);

    function downloadIcons() {
      // 192x192
      const canvas192 = document.getElementById('canvas192');
      const link192 = document.createElement('a');
      link192.download = 'icon-192x192.png';
      link192.href = canvas192.toDataURL();
      link192.click();

      // 512x512
      setTimeout(() => {
        const canvas512 = document.getElementById('canvas512');
        const link512 = document.createElement('a');
        link512.download = 'icon-512x512.png';
        link512.href = canvas512.toDataURL();
        link512.click();
      }, 500);
      
      alert('아이콘 다운로드가 시작되었습니다.\n다운로드한 파일을 public/icons/ 폴더에 넣어주세요.');
    }
  </script>
</body>
</html>
